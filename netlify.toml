[build]
  command = "npm run build"
  publish = "dist/public"

[functions]
  directory = "server"
  included_files = ["herzing_transfer_page_content.txt"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/netlify"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
