[build]
  command = "npm run build"
  publish = "dist/public"

[functions]
  directory = "netlify/functions"
  included_files = ["herzing_transfer_page_content.txt"]

[[redirects]]
  # Route all API requests to our serverless function
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  # Catch-all for the Single Page App (Vite)
  from = "/*"
  to = "/index.html"
  status = 200
